name: Deploy frontend

on:
  workflow_dispatch:

env:
  AWS_APP: canyoulearnmusic-com
  NODE_VERSION: 22
  BUILD_DIR: dist/
  CLOUDFLARE_ZONE: 96ac6d1dec8757be7477683e0f4d520a

jobs:
  env:
    runs-on: ubuntu-latest
    outputs:
      AWS_APP: ${{ env.AWS_APP }}
      NODE_VERSION: ${{ env.NODE_VERSION }}
      BUILD_DIR: ${{ env.BUILD_DIR }}
      CLOUDFLARE_ZONE: ${{ env.CLOUDFLARE_ZONE }}
    steps:
      - run: echo ""

  build:
    needs: [env]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache NPM
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.env.outputs.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: |
          npm ci
          NODE_ENV="production" npm run frontend:build
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.env.outputs.AWS_APP }}
          path: ${{ needs.env.outputs.BUILD_DIR }}/*

  deploy:
    permissions:
      contents: read
      id-token: write
    needs: [env, build]
    uses: smzelek/aws-hosting/.github/workflows/deploy-app.yml@main
    secrets: inherit
    with:
      aws-app: ${{ needs.env.outputs.AWS_APP }}
      app-artifact: ${{ needs.env.outputs.AWS_APP }}
      cloudflare-zone: ${{ needs.env.outputs.CLOUDFLARE_ZONE }}

  tag-production:
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - run: git push -f origin HEAD:production-frontend 
  